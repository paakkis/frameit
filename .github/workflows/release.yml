name: Build Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run build

      - name: Zip dist
        run: |
          cd dist
          zip -r ../frameit.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frameit.zip
